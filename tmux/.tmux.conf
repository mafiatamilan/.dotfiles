# ~/.tmux.conf
# Minimal black / white / red theme

# --- General behavior ---
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set-option -sa terminal-overrides ",xterm*:Tc"

# Prefix: keep default C-b, but also allow C-a
set -g prefix2 C-a
bind C-a send-prefix -2

# --- Splits / reload ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
bind r source-file ~/.tmux.conf \; display-message "config reloaded"

# --- Pane navigation (vim-style) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ============================
#         COLOR PALETTE
# ============================
# black:  #0a0a0a
# white:  #f2f2f2
# red:    #e0102b
# grey:   #6b6b6b (inactive text)
# dgrey:  #1a1a1a (panels)

# --- Status bar ---
set -g status on
set -g status-interval 5
set -g status-justify left
set -g status-position bottom
set -g status-style "bg=#0a0a0a,fg=#f2f2f2"

set -g status-left-length 20
set -g status-left "#[bg=#e0102b,fg=#0a0a0a,bold] #S #[bg=#0a0a0a,fg=#e0102b]"

set -g status-right-length 50
set -g status-right "#[fg=#6b6b6b]%Y-%m-%d #[fg=#f2f2f2,bold]%H:%M "

# --- Window list ---
setw -g window-status-format " #I:#W "
setw -g window-status-style "fg=#6b6b6b,bg=#0a0a0a"

setw -g window-status-current-format " #I:#W "
setw -g window-status-current-style "fg=#0a0a0a,bg=#e0102b,bold"

setw -g window-status-separator ""

# --- Pane borders ---
set -g pane-border-style "fg=#1a1a1a"
set -g pane-active-border-style "fg=#e0102b"

# --- Messages / command line ---
set -g message-style "bg=#e0102b,fg=#0a0a0a,bold"
set -g message-command-style "bg=#1a1a1a,fg=#f2f2f2"

# --- Clock mode ---
setw -g clock-mode-colour "#e0102b"

# --- Copy mode selection ---
setw -g mode-style "bg=#e0102b,fg=#0a0a0a"
