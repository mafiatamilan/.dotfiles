# ~/.tmux.conf
# Minimal black / white / red theme

# ============================
#      GENERAL BEHAVIOR
# ============================
set -g mouse on
set -g history-limit 10000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -sa terminal-overrides ",xterm*:Tc"

# ============================
#         PREFIX KEYS
# ============================
# Keep default Ctrl-b and also allow Ctrl-a
set -g prefix2 C-a
bind C-a send-prefix -2

# ============================
#      SPLITS / RELOAD
# ============================
unbind '"'
unbind %

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind r source-file ~/.tmux.conf \; display-message "✓ tmux config reloaded"

# ============================
#     PANE NAVIGATION
# ============================
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Optional: resize panes with Alt + h/j/k/l
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# ============================
#   WINDOW SHORTCUTS (Alt+1..9)
# ============================
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Optional: Alt+n / Alt+p for next/previous window
bind -n M-n next-window
bind -n M-p previous-window

# ============================
#         COLOR PALETTE
# ============================
# black:  #0a0a0a
# white:  #f2f2f2
# red:    #e0102b
# grey:   #6b6b6b
# dgrey:  #1a1a1a

# ============================
#         STATUS BAR
# ============================
set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-interval 5

set -g status-style "bg=#0a0a0a,fg=#f2f2f2"

set -g status-left-length 20
set -g status-left "#[bg=#e0102b,fg=#0a0a0a,bold] #S #[bg=#0a0a0a,fg=#e0102b]"

set -g status-right-length 50
set -g status-right "#[fg=#6b6b6b]%Y-%m-%d #[fg=#f2f2f2,bold]%H:%M "

# ============================
#        WINDOW LIST
# ============================
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

setw -g window-status-style "fg=#6b6b6b,bg=#0a0a0a"
setw -g window-status-current-style "fg=#0a0a0a,bg=#e0102b,bold"

setw -g window-status-separator ""

# ============================
#        PANE BORDERS
# ============================
set -g pane-border-style "fg=#1a1a1a"
set -g pane-active-border-style "fg=#e0102b"

# ============================
#    MESSAGES / COMMAND LINE
# ============================
set -g message-style "bg=#e0102b,fg=#0a0a0a,bold"
set -g message-command-style "bg=#1a1a1a,fg=#f2f2f2"

# ============================
#        COPY MODE
# ============================
setw -g mode-style "bg=#e0102b,fg=#0a0a0a"

# ============================
#         CLOCK MODE
# ============================
setw -g clock-mode-colour "#e0102b"
